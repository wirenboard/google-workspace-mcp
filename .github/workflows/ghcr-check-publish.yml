name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: read   # checkout
  packages: write  # push image to ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # No first-party code to unit-test: the app is the pinned upstream package.
    # Smoke gate instead — the pinned version must install and its entry point run.
    - name: Install pinned package
      run: pip install -r requirements.txt

    - name: Smoke-check the console script
      run: workspace-mcp --help

  build:
    runs-on: ubuntu-latest
    needs: test                          # no green smoke test → no image is built
    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Compute image tags
      id: tags
      # main -> :latest + :<sha> (watchtower deploys :latest); develop -> :develop only
      run: |
        if [ "${{ github.ref_name }}" = "main" ]; then
          echo "tags=ghcr.io/${{ github.repository }}:latest ghcr.io/${{ github.repository }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
        else
          echo "tags=ghcr.io/${{ github.repository }}:develop" >> "$GITHUB_OUTPUT"
        fi

    - name: Build the Docker image
      run: |
        tag_args=""
        for tag in ${{ steps.tags.outputs.tags }}; do tag_args="$tag_args --tag $tag"; done
        docker build . --file Dockerfile $tag_args

    - name: Push Docker images
      run: |
        for tag in ${{ steps.tags.outputs.tags }}; do docker push "$tag"; done
